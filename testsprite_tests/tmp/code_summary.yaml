version: "2"
type: backend
tech_stack:
  - Python
  - FastAPI
  - SQLModel (SQLAlchemy)
  - SQLite (aiosqlite) for local / PostgreSQL for prod
  - Pydantic
features:
  - name: Health Check
    description: Verify API operational status
    files:
      - main.py
    endpoints:
      - method: GET
        path: /health
        description: Returns API health status
        auth_required: false
        response_schema:
          "200": "{status: string, version: string, timestamp: string}"
  - name: Deal Management
    description: CRUD operations for sales deals (projects)
    files:
      - main.py
      - models.py
    endpoints:
      - method: GET
        path: /deals/kanban
        description: List deals formatted for Kanban board
        auth_required: false
        response_schema:
          "200": "object (columns mapping to deal lists)"
      - method: POST
        path: /deals
        description: Create a new deal
        auth_required: false
        request_schema:
          body:
            municipi_id: string
            estat: string
            pla_tipus: string
            preu_acordat: number
        response_schema:
          "200": Deal
      - method: GET
        path: /deals/{deal_id}/full
        description: Get full 360 view of a deal
        auth_required: false
        response_schema:
          "200": object
  - name: Contacts Management
    description: Manage municipality contacts
    files:
      - main.py
      - models.py
    endpoints:
      - method: GET
        path: /contactes
        description: List all contacts
        auth_required: false
      - method: POST
        path: /contactes
        description: Create a contact
        auth_required: false
  - name: Municipalities Management
    description: Information about towns and cities
    files:
      - main.py
      - models.py
    endpoints:
      - method: GET
        path: /municipis
        description: List all municipalities
        auth_required: false
  - name: Calendar & Timeline
    description: Activity tracking and scheduling
    files:
      - main.py
      - models.py
    endpoints:
      - method: GET
        path: /calendar/events
        description: Get events for react-big-calendar
        auth_required: false
      - method: POST
        path: /interaccions
        description: Log a new interaction
        auth_required: false
  - name: AI Agent
    description: Chat interface for deals analysis
    files:
      - main.py
      - services/ai_agent.py
    endpoints:
      - method: POST
        path: /agent/deals/{deal_id}/ask
        description: Ask Kimi AI about a specific deal
        auth_required: false
known_limitations: []
